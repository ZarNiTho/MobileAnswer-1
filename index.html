<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Answer - AI Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .header-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); }
        .active-nav { color: #4f46e5 !important; font-weight: 800; }
        .active-nav span:first-child { background-color: #eef2ff; border-radius: 12px; }
    </style>
</head>
<body class="pb-28">

    <header class="header-gradient text-white px-6 py-10 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black flex items-center gap-2">
                <span class="material-icons-round">storefront</span> Mobile Answer
            </h1>
            <div id="syncStatus" class="text-[10px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase">Ready</div>
        </div>
        <div class="bg-white/10 backdrop-blur-md rounded-3xl p-5 border border-white/20">
            <p id="totalTitle" class="text-[10px] font-bold uppercase opacity-80 mb-1">စုစုပေါင်း ပစ္စည်းတန်ဖိုး</p>
            <div class="flex items-baseline gap-2">
                <h2 id="grandTotal" class="text-3xl font-black">0</h2>
                <span class="text-sm font-bold opacity-70">ကျပ်</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-8">
        
        <div class="bg-white p-4 rounded-3xl shadow-xl mb-6 border-2 border-indigo-50">
            <div class="flex items-center gap-2 mb-3 ml-1">
                <span class="material-icons-round text-indigo-500 text-lg">auto_awesome</span>
                <span class="text-[11px] font-black text-slate-500 uppercase tracking-widest">AI Quick Add (အမိန့်ပေးရန်)</span>
            </div>
            <div class="flex gap-2">
                <input type="text" id="aiInput" placeholder="ဥပမာ- iPhone screen 5 ခု၊ 50000 နဲ့ 60000..." 
                    class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="aiBtn" class="bg-indigo-600 text-white p-3 rounded-2xl active:scale-90 transition">
                    <span class="material-icons-round">bolt</span>
                </button>
            </div>
            <p id="aiStatus" class="text-[10px] text-indigo-500 mt-2 ml-1 italic font-medium"></p>
        </div>

        <div id="inventoryPage">
            <button id="toggleBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg flex justify-center items-center gap-2 mb-6">
                <span class="material-icons-round" id="btnIcon">add_circle</span>
                <span id="btnText">ပစ္စည်းအသစ်ထည့်သွင်းရန်</span>
            </button>

            <section id="formSection" class="hidden bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50 mb-8">
                <form id="itemForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    <select id="itemGroup" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none">
                        <option value="Hardware အပိုပစ္စည်">Hardware အပိုပစ္စည်</option>
                        <option value="Accessor">Accessor</option>
                        <option value="အထွေထွေပစ္စည်း">အထွေထွေပစ္စည်း</option>
                    </select>
                    <input type="text" id="itemName" placeholder="ပစ္စည်းအမည်" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-semibold outline-none" required>
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" id="itemQty" placeholder="ခုရေ" class="p-4 bg-slate-50 border-none rounded-2xl text-sm text-center font-black" required>
                        <input type="number" id="costPrice" placeholder="ရင်းဈေး" class="p-4 bg-slate-50 border-none rounded-2xl text-sm text-center font-black" required>
                        <input type="number" id="sellPrice" placeholder="ရောင်းဈေး" class="p-4 bg-slate-50 border-none rounded-2xl text-sm text-center font-black" required>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm">စာရင်းသိမ်းဆည်းမည်</button>
                </form>
            </section>

            <div id="itemList" class="space-y-4"></div>
        </div>

        <div id="financePage" class="hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50 mb-6">
                <h3 class="font-bold text-slate-700 mb-5 flex items-center gap-2 text-sm">
                    <span class="material-icons-round text-emerald-500">account_balance_wallet</span> ဝင်ငွေ/ထွက်ငွေ မှတ်တမ်း
                </h3>
                <form id="financeForm" class="space-y-4">
                    <div class="flex gap-3">
                        <button type="button" id="setIn" class="flex-1 py-4 rounded-2xl font-black text-xs bg-emerald-500 text-white">ဝင်ငွေ (+)</button>
                        <button type="button" id="setOut" class="flex-1 py-4 rounded-2xl font-black text-xs bg-slate-100 text-slate-400">ထွက်ငွေ (-)</button>
                    </div>
                    <input type="text" id="finDesc" placeholder="အကြောင်းအရာ" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm outline-none" required>
                    <input type="number" id="finAmount" placeholder="ပမာဏ (ကျပ်)" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-black outline-none" required>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm">စာရင်းသွင်းမည်</button>
                </form>
            </div>
            <div id="finList" class="space-y-3"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-10 py-4 flex justify-around items-center z-50 rounded-t-[30px] shadow-2xl">
        <button id="navInv" class="active-nav flex flex-col items-center gap-1.5 transition-all">
            <span class="material-icons-round p-2">layers</span>
            <span class="text-[10px]">ပစ္စည်းစာရင်း</span>
        </button>
        <button id="navFin" class="text-slate-300 flex flex-col items-center gap-1.5 transition-all">
            <span class="material-icons-round p-2">account_balance_wallet</span>
            <span class="text-[10px]">ဝင်ငွေ/ထွက်ငွေ</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase & Gemini Config
        const firebaseConfig = {
            apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ",
            authDomain: "masstore-c32a7.firebaseapp.com",
            projectId: "masstore-c32a7",
            storageBucket: "masstore-c32a7.appspot.com",
            messagingSenderId: "321720130071",
            appId: "1:321720130071:web:20aab19001cc8bb3cd9a52"
        };
        const GEMINI_KEY = "AIzaSyAElU0ONv4z94fyBUw_nUjpMyuqPyipbzY";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        // AI Feature
        document.getElementById('aiBtn').onclick = async () => {
            const prompt = document.getElementById('aiInput').value;
            const status = document.getElementById('aiStatus');
            if(!prompt) return;

            status.innerText = "AI စဉ်းစားနေသည်...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Extract data from: "${prompt}". Return ONLY JSON: {"name": "string", "qty": number, "cost": number, "sell": number, "group": "Hardware အပိုပစ္စည်"}` }] }]
                    })
                });
                const res = await response.json();
                const aiData = JSON.parse(res.candidates[0].content.parts[0].text);
                await addDoc(collection(db, "items"), { ...aiData, timestamp: new Date().getTime() });
                document.getElementById('aiInput').value = "";
                status.innerText = "AI က '" + aiData.name + "' ကို စာရင်းသွင်းပေးလိုက်ပါပြီ။ ✨";
            } catch (e) { status.innerText = "နားမလည်ပါ၊ ပြန်ပြောပြပါ။"; }
        };

        // Navigation & Pages
        const invPage = document.getElementById('inventoryPage');
        const finPage = document.getElementById('financePage');
        const navInv = document.getElementById('navInv');
        const navFin = document.getElementById('navFin');
        const totalTitle = document.getElementById('totalTitle');
        const grandTotalTxt = document.getElementById('grandTotal');

        navInv.onclick = () => {
            invPage.classList.remove('hidden'); finPage.classList.add('hidden');
            navInv.classList.add('active-nav'); navFin.classList.remove('active-nav');
            totalTitle.innerText = "စုစုပေါင်း ပစ္စည်းတန်ဖိုး";
        };
        navFin.onclick = () => {
            finPage.classList.remove('hidden'); invPage.classList.add('hidden');
            navFin.classList.add('active-nav'); navInv.classList.remove('active-nav');
            totalTitle.innerText = "လက်ကျန်ငွေ စုစုပေါင်း";
        };

        // Inventory List Logic
        let allItems = [];
        onSnapshot(query(collection(db, "items"), orderBy("timestamp", "desc")), (snap) => {
            allItems = []; let total = 0;
            snap.forEach(d => {
                const item = {id: d.id, ...d.data()};
                allItems.push(item);
                total += (item.qty * item.sell);
            });
            if(!invPage.classList.contains('hidden')) grandTotalTxt.innerText = total.toLocaleString();
            renderItems(allItems);
        });

        function renderItems(data) {
            const list = document.getElementById('itemList');
            list.innerHTML = data.length ? "" : '<div class="text-center py-10 opacity-30 italic text-sm">ပစ္စည်းစာရင်း မရှိသေးပါ။</div>';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50 flex justify-between items-center";
                div.innerHTML = `
                    <div class="flex-1">
                        <span class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md uppercase">${item.group}</span>
                        <h4 class="font-bold text-slate-800 text-sm mt-1">${item.name}</h4>
                        <p class="text-[10px] text-emerald-600 font-bold">${item.sell.toLocaleString()} Ks</p>
                    </div>
                    <div class="bg-indigo-600 text-white px-4 py-2 rounded-2xl text-center shadow-lg shadow-indigo-100">
                        <span class="block text-[8px] font-bold opacity-70">QTY</span>
                        <span class="text-xs font-black">${item.qty}</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Finance List Logic
        let currentFinType = 'income';
        document.getElementById('setIn').onclick = () => { currentFinType = 'income'; document.getElementById('setIn').className = "flex-1 py-4 rounded-2xl font-black text-xs bg-emerald-500 text-white"; document.getElementById('setOut').className = "flex-1 py-4 rounded-2xl font-black text-xs bg-slate-100 text-slate-400"; };
        document.getElementById('setOut').onclick = () => { currentFinType = 'expense'; document.getElementById('setOut').className = "flex-1 py-4 rounded-2xl font-black text-xs bg-rose-500 text-white"; document.getElementById('setIn').className = "flex-1 py-4 rounded-2xl font-black text-xs bg-slate-100 text-slate-400"; };

        document.getElementById('financeForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "finance"), {
                type: currentFinType,
                desc: document.getElementById('finDesc').value,
                amount: parseFloat(document.getElementById('finAmount').value),
                time: new Date().getTime()
            });
            document.getElementById('financeForm').reset();
        };

        onSnapshot(query(collection(db, "finance"), orderBy("time", "desc")), (snap) => {
            let net = 0; const list = document.getElementById('finList');
            list.innerHTML = "";
            snap.forEach(d => {
                const f = d.data();
                if(f.type === 'income') net += f.amount; else net -= f.amount;
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border-l-4 " + (f.type === 'income' ? 'border-emerald-500' : 'border-rose-500');
                div.innerHTML = `<div class="flex justify-between items-center"><span class="font-bold text-sm">${f.desc}</span><span class="font-black ${f.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">${f.type === 'income' ? '+' : '-'}${f.amount.toLocaleString()}</span></div>`;
                list.appendChild(div);
            });
            if(!finPage.classList.contains('hidden')) grandTotalTxt.innerText = net.toLocaleString();
        });

        // Manual Form Toggle
        document.getElementById('toggleBtn').onclick = () => {
            const isHidden = document.getElementById('formSection').classList.toggle('hidden');
            document.getElementById('btnText').innerText = isHidden ? "ပစ္စည်းအသစ်ထည့်သွင်းရန်" : "ပြန်ပိတ်မည်";
            document.getElementById('btnIcon').innerText = isHidden ? "add_circle" : "cancel";
        };

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "items"), {
                group: document.getElementById('itemGroup').value,
                name: document.getElementById('itemName').value,
                qty: parseInt(document.getElementById('itemQty').value),
                cost: parseFloat(document.getElementById('costPrice').value),
                sell: parseFloat(document.getElementById('sellPrice').value),
                timestamp: new Date().getTime()
            });
            document.getElementById('itemForm').reset();
            document.getElementById('formSection').classList.add('hidden');
        };
    </script>
</body>
</html>
