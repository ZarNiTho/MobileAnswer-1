<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobileAnswer - Full System</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;500;700&display=swap');
        :root { --primary: #2563eb; --secondary: #7c3aed; --dark: #0f172a; --bg: #f3f4f6; --success: #10b981; --danger: #ef4444; }
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans Myanmar',sans-serif; }
        body{ background: var(--bg); min-height:100vh; padding-bottom:50px; }
        
        .header-section { background: linear-gradient(135deg, #1e3a8a, #7c3aed); padding: 40px 20px 80px; text-align: center; color: white; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .logo-wrapper { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 12px; padding: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .container { padding: 15px; margin-top: -65px; max-width: 550px; margin-left: auto; margin-right: auto; }
        .total-value-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-bottom: 4px solid var(--primary); }
        #groupTotal { color: var(--primary); font-size: 24px; font-weight: 700; }
        .search-box { background: white; border-radius: 20px; padding: 12px 20px; margin-bottom: 15px; }
        .search-box input { width: 100%; border: none; outline: none; font-size: 16px; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .summary-card { background: white; padding: 8px 2px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .summary-card.active-filter { border-color: var(--primary); background: #eff6ff; }
        .summary-card h3 { font-size: 8px; color: #64748b; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .card-actions button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="logo-wrapper"><img src="https://i.postimg.cc/sg5cDCt1/file-0000000001307207a601f81cc1f5617a.png" alt="Logo"></div>
    <h1>MobileAnswer</h1>
</div>

<div class="container">
    <div class="total-value-card">
        <div id="filterTitle">လက်ကျန်ပစ္စည်း စုစုပေါင်းတန်ဖိုး</div>
        <h2 id="groupTotal">0 Ks</h2>
    </div>

    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 ရှာဖွေရန်..."></div>

    <div class="summary-grid">
        <div class="summary-card active-filter" onclick="setFilter('အားလုံး', this)"><h3>အားလုံး</h3><p id="tCount">0</p></div>
        <div class="summary-card" onclick="setFilter('အထွေထွေ', this)"><h3>အထွေထွေ</h3><p id="gCount">0</p></div>
        <div class="summary-card" onclick="setFilter('Hardwareအပိုပစ္စည်', this)"><h3>HW</h3><p id="hCount">0</p></div>
        <div class="summary-card" onclick="setFilter('accessories', this)"><h3>Acc</h3><p id="aCount">0</p></div>
    </div>

    <button class="open-form-btn" id="btnToggle" style="width:100%; padding:15px; border-radius:15px; border:none; margin-bottom:15px;" onclick="toggleForm()">+ ပစ္စည်းအသစ်ထည့်ရန်</button>

    <div id="productForm" style="display:none; background:white; padding:20px; border-radius:20px; margin-bottom:15px;">
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="အမည်" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="category" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="အထွေထွေ">အထွေထွေ</option>
            <option value="Hardwareအပိုပစ္စည်">Hardwareအပိုပစ္စည်</option>
            <option value="accessories">accessories</option>
        </select>
        <input type="number" id="amount" placeholder="အရေအတွက်" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="number" id="price" placeholder="စျေးနှုန်း" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="handleSave()" style="width:100%; padding:10px; background:blue; color:white; border:none; border-radius:10px;">သိမ်းဆည်းမည်</button>
    </div>

    <div id="productList"></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFilter = 'အားလုံး';
let allData = [];

// Data ဆွဲထုတ်ခြင်း
db.collection("products").onSnapshot((snap) => {
    allData = [];
    snap.forEach((doc) => { allData.push({id: doc.id, ...doc.data()}); });
    renderList();
});

function renderList() {
    const list = document.getElementById("productList");
    const searchVal = document.getElementById("searchInput").value.toLowerCase();
    list.innerHTML = "";
    let t=0, g=0, h=0, a=0, totalVal=0;

    allData.forEach(d => {
        const amt = Number(d.amount || 0);
        const prc = Number(d.price || 0);
        
        // Count
        if(d.category === "အထွေထွေ") g += amt;
        if(d.category === "Hardwareအပိုပစ္စည်") h += amt;
        if(d.category === "accessories") a += amt;
        t++;

        // Filter Logic & Search Logic
        const matchFilter = (currentFilter === 'အားလုံး' || d.category === currentFilter);
        const matchSearch = d.name.toLowerCase().includes(searchVal);

        if (matchFilter && matchSearch) {
            totalVal += (amt * prc);
            list.innerHTML += `
            <div class="card">
                <div><strong>${d.name}</strong> (${d.category})</div>
                <div>အရေအတွက်: ${amt} | စျေးနှုန်း: ${prc}</div>
                <div class="card-actions">
                    <button class="edit-btn" onclick="startEdit('${d.id}', '${d.name}', '${d.category}', ${amt}, ${prc})">ပြင်မည်</button>
                    <button class="delete-btn" onclick="handleDelete('${d.id}')">ဖျက်မည်</button>
                </div>
            </div>`;
        }
    });

    document.getElementById("tCount").innerText = t;
    document.getElementById("gCount").innerText = g;
    document.getElementById("hCount").innerText = h;
    document.getElementById("aCount").innerText = a;
    document.getElementById("groupTotal").innerText = totalVal.toLocaleString() + " Ks";
}

// Event Listeners
document.getElementById("searchInput").addEventListener("input", renderList);

function setFilter(cat, el) {
    currentFilter = cat;
    document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active-filter'));
    el.classList.add('active-filter');
    renderList();
}

function startEdit(id, n, c, a, p) {
    document.getElementById("editId").value = id;
    document.getElementById("name").value = n;
    document.getElementById("category").value = c;
    document.getElementById("amount").value = a;
    document.getElementById("price").value = p;
    document.getElementById("productForm").style.display = "block";
}

async function handleSave() {
    const id = document.getElementById("editId").value;
    const data = { name: document.getElementById("name").value, category: document.getElementById("category").value, amount: Number(document.getElementById("amount").value), price: Number(document.getElementById("price").value) };
    if(id) await db.collection("products").doc(id).update(data);
    else await db.collection("products").add(data);
    document.getElementById("productForm").style.display = "none";
}

async function handleDelete(id) { await db.collection("products").doc(id).delete(); }
function toggleForm() { document.getElementById("productForm").style.display = (document.getElementById("productForm").style.display === "none") ? "block" : "none"; }

</script>
</body>
</html>
