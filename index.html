<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobileAnswer</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* မူလအဆင်ပြေတဲ့ CSS အတိုင်း */
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { padding: 8px; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<input type="text" id="searchInput" placeholder="🔍 ရှာရန်..." style="width:100%; padding:10px; margin-bottom:10px;">
<div style="display:flex; gap:5px; margin-bottom:10px;">
    <button onclick="setFilter('အားလုံး')">အားလုံး</button>
    <button onclick="setFilter('အထွေထွေ')">အထွေထွေ</button>
    <button onclick="setFilter('Hardwareအပိုပစ္စည်')">HW</button>
    <button onclick="setFilter('accessories')">Accessories</button>
</div>

<div id="productList"></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFilter = 'အားလုံး';

function setFilter(cat) {
    currentFilter = cat;
    loadProducts();
}

document.getElementById('searchInput').addEventListener('input', loadProducts);

function loadProducts() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    
    db.collection("products").orderBy("updatedAt", "desc").onSnapshot(snap => {
        const list = document.getElementById("productList");
        list.innerHTML = "";
        
        snap.forEach(doc => {
            const d = doc.data();
            // Search နှင့် Filter Logic
            const matchFilter = (currentFilter === 'အားလုံး' || d.category === currentFilter);
            const matchSearch = d.name.toLowerCase().includes(searchVal);

            if (matchFilter && matchSearch) {
                const timeStr = d.updatedAt ? d.updatedAt.toDate().toLocaleString() : "Date မရှိ";
                list.innerHTML += `
                <div class="card">
                    <div><strong>${d.name}</strong> (${d.category})</div>
                    <div>အရေအတွက်: ${d.amount} | စျေးနှုန်း: ${d.price}</div>
                    <div style="font-size:10px;">🕒 ${timeStr}</div>
                    <div class="btn-group">
                        <button onclick="edit('${doc.id}')">ပြင်</button>
                        <button onclick="del('${doc.id}')">ဖျက်</button>
                    </div>
                </div>`;
            }
        });
    });
}
function edit(id) { /* Edit logic */ }
async function del(id) { await db.collection("products").doc(id).delete(); }

loadProducts();
</script>
</body>
</html>
