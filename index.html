<script>
// Log Activity Function (မူရင်း function များအောက်တွင် ထည့်ပါ)
async function logActivity(action, details) {
    try {
        await db.collection("activity_logs").add({ 
            action: action, 
            details: details, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        });
    } catch (e) { console.error("Log error: ", e); }
}

// sellOne function တွင် Log ထည့်ထားသည်
async function sellOne(id, name, currAmt, price, cat) {
    const res = await Swal.fire({ title: 'ရောင်းထုတ်မှာလား?', text: name + " (၁) ခု ရောင်းမည်", icon: 'warning', showCancelButton: true });
    if(res.isConfirmed) {
        if(currAmt > 1) await db.collection("products").doc(id).update({ amount: currAmt - 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        else await db.collection("products").doc(id).delete();
        
        await db.collection("transactions").add({ type: "ဝင်ငွေ", name: "ရောင်းရငွေ: " + name, amount: Number(price), date: new Date() });
        await logActivity("ရောင်းချခြင်း", name + " (၁) ခု ရောင်းချပြီး " + price + " Ks ရရှိသည်။");

        const saleRef = db.collection("products").where("name", "==", name + " (ရောင်းပြီး)").where("status", "==", "ရောင်းပြီး");
        const saleSnap = await saleRef.get();
        if(!saleSnap.empty) {
            const saleDoc = saleSnap.docs[0];
            await db.collection("products").doc(saleDoc.id).update({ amount: saleDoc.data().amount + 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await db.collection("products").add({ name: name + " (ရောင်းပြီး)", category: cat, status: "ရောင်းပြီး", amount: 1, price: price, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        Swal.fire({ icon: 'success', title: 'ရောင်းချပြီးစီး', timer: 1000 });
    }
}

// handleSave function တွင် Log ထည့်ထားသည်
async function handleSave(){ 
    const id = document.getElementById("editId").value; 
    const name = document.getElementById("name").value; 
    const amount = document.getElementById("amount").value;
    const price = document.getElementById("price").value;
    const category = document.getElementById("category").value;
    
    const res = await Swal.fire({ title: 'အတည်ပြုမလား?', icon: 'question', showCancelButton: true }); 
    if(res.isConfirmed) { 
        const data = { name: name, category: category, status: document.getElementById("status").value, amount: Number(amount), price: Number(price), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }; 
        
        if(id) {
            // အရင် Data ကို အရင်ယူပြီး ဘာပြောင်းလဲသွားလဲ စစ်မယ်
            const oldDoc = await db.collection("products").doc(id).get();
            const oldData = oldDoc.data();
            let changes = [];
            if(oldData.name !== name) changes.push(`နာမည်(${oldData.name}->${name})`);
            if(oldData.price != price) changes.push(`စျေး(${oldData.price}->${price})`);
            if(oldData.amount != amount) changes.push(`အရေအတွက်(${oldData.amount}->${amount})`);
            
            await db.collection("products").doc(id).update(data);
            await logActivity("ပြင်ဆင်ခြင်း", name + " တွင် " + changes.join(", ") + " အား ပြင်ဆင်သည်။");
        } else {
            await db.collection("products").add(data);
            await logActivity("ပစ္စည်းအသစ်ထည့်ခြင်း", name + " (စျေး: " + price + ", အရေအတွက်: " + amount + ")");
        }
        Swal.fire({ icon: 'success', title: 'အောင်မြင်ပါသည်', timer: 1500 }); 
        forceClear(); 
    } 
}


// handleDelete function တွင် Log ထည့်ထားသည်
async function handleDelete(id){ 
    const res = await Swal.fire({ title: 'ဖျက်မှာလား?', icon: 'warning', showCancelButton: true }); 
    if(res.isConfirmed) {
        const doc = await db.collection("products").doc(id).get();
        await db.collection("products").doc(id).delete();
        await logActivity("ဖျက်ခြင်း", doc.data().name + " အား ဖျက်လိုက်သည်။");
    }
}
</script>
