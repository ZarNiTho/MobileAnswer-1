<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobileAnswer - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans Myanmar', sans-serif; background: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 10px; border: 3px solid #4f46e5; padding: 2px; }
        h2 { color: #1e293b; font-size: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.2); }
        .btn-auth { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #4338ca; }
        .toggle-text { margin-top: 20px; font-size: 13px; color: #64748b; }
        .toggle-text span { color: #4f46e5; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-container">
    <img src="https://i.postimg.cc/sg5cDCt1/file-0000000001307207a601f81cc1f5617a.png" class="logo-img" alt="Logo">
    <h2 id="authTitle">စနစ်သို့ ဝင်ရောက်ရန်</h2>

    <div class="input-group" id="userGroup" style="display: none;">
        <label>အသုံးပြုသူအမည် (Username)</label>
        <input type="text" id="username" placeholder="ဥပမာ - Admin Mg Mg">
    </div>
    
    <div class="input-group">
        <label>အီးမေးလ် (Email)</label>
        <input type="email" id="email" placeholder="example@mail.com">
    </div>
    
    <div class="input-group">
        <label>စကားဝှက် (Password)</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-auth" id="authBtn" onclick="handleAuth()">အကောင့်ဝင်မည်</button>

    <div class="toggle-text">
        <span id="toggleLink" onclick="toggleMode()">အကောင့်သစ် ဖန်တီးမည်လား?</span>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLogin = true;

    // အကယ်၍ အကောင့်ဝင်ထားပြီးသားဆိုပါက index သို့ တန်းသွားမည်
    auth.onAuthStateChanged(user => {
        if (user) window.location.href = 'main.html';
    });

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "စနစ်သို့ ဝင်ရောက်ရန်" : "အကောင့်သစ် ဖန်တီးရန်";
        document.getElementById('userGroup').style.display = isLogin ? "none" : "block";
        document.getElementById('authBtn').innerText = isLogin ? "အကောင့်ဝင်မည်" : "မှတ်ပုံတင်မည်";
        document.getElementById('toggleLink').innerText = isLogin ? "အကောင့်ရှိပြီးသားလား? ဝင်ရောက်ရန်" : "အကောင့်သစ် ဖန်တီးမည်လား?";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value.trim();

        if (!email || !password || (!isLogin && !username)) {
            return Swal.fire('လိုအပ်ချက်', 'အချက်အလက်အားလုံး ပြည့်စုံအောင်ထည့်ပါ။', 'warning');
        }

        document.getElementById('authBtn').innerText = "လုပ်ဆောင်နေပါသည်...";
        document.getElementById('authBtn').disabled = true;

        try {
            if (isLogin) {
                // Login
                const cred = await auth.signInWithEmailAndPassword(email, password);
                await db.collection("users").doc(cred.user.uid).update({ lastOnline: firebase.firestore.FieldValue.serverTimestamp() });
                await db.collection("activity_logs").add({ 
                    action: `[${cred.user.displayName || email}] System Login`, 
                    details: "စနစ်ထဲသို့ ဝင်ရောက်လာပါသည်။", 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                });
            } else {
                // Register
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: username });
                
                await db.collection("users").doc(cred.user.uid).set({
                    username: username,
                    email: email,
                    uid: cred.user.uid,
                    lastOnline: firebase.firestore.FieldValue.serverTimestamp()
                });

                await db.collection("activity_logs").add({ 
                    action: `[${username}] New Account`, 
                    details: "အကောင့်အသစ် ဖွင့်လိုက်ပါသည်။", 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                });
            }
        } catch (error) {
            Swal.fire('အမှားအယွင်း', error.message, 'error');
            document.getElementById('authBtn').disabled = false;
            document.getElementById('authBtn').innerText = isLogin ? "အကောင့်ဝင်မည်" : "မှတ်ပုံတင်မည်";
        }
    }
</script>
</body>
</html>
