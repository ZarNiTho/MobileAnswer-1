<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ငွေစာရင်း</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&display=swap');
        
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        body { 
            font-family: 'Noto Sans Myanmar', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main);
            padding: 15px 10px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }

        .container { width: 100%; max-width: 480px; }
        
        .page-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            color: var(--text-main);
        }

        .filter-input { 
            width: 100%; 
            padding: 12px; 
            background: var(--bg-card);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 14px; 
            color: var(--text-main);
            margin-bottom: 15px;
            outline: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-main { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        .date-group { 
            margin-top: 12px; 
            padding: 14px; 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 13px; 
            font-weight: bold; 
        }
        
        .details { 
            display: none; 
            padding: 12px; 
            background: #151f32; 
            border: 1px solid var(--border); 
            border-top: none; 
            border-bottom-left-radius: 12px; 
            border-bottom-right-radius: 12px; 
            margin-top: -4px;
        }

        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 5px; 
            border-bottom: 1px solid var(--border); 
            font-size: 14px; 
        }
        .row:last-child { border-bottom: none; }

        .remark-btn { 
            background: #334155; 
            color: #cbd5e1;
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            margin-left: 5px; 
            cursor: pointer; 
        }
        .delete-btn { background: #451a1a; color: var(--danger); }
        
        .remark-text { 
            font-size: 12px; 
            color: #fbbf24; 
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 6px 12px; 
            border-radius: 8px;
            margin-top: 6px;
        }

        .group-badge { 
            background: #334155; 
            color: #94a3b8; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 10px; 
            margin-right: 8px; 
            font-weight: normal; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">💰 ငွေစာရင်းချုပ်</div>
    
    <input type="month" id="monthFilter" class="filter-input" onchange="renderHistory()" placeholder="လအလိုက်ရှာရန်">
    
    <div class="btn-grid">
        <button class="btn-main" style="background: var(--success);" onclick="openDialog('ဝင်ငွေ')">💰 ဝင်ငွေမှတ်မည်</button>
        <button class="btn-main" style="background: var(--danger);" onclick="openDialog('ထွက်ငွေ')">💸 ထွက်ငွေမှတ်မည်</button>
    </div>

    <div id="historyList"></div>
    
    <button class="btn-main" style="background: #475569; margin-top:20px;" onclick="window.location.href='index.html'">🔙 ပင်မစာမျက်နှာ</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    let isDialogOpen = false;
    let txData = [], rpData = [], rmData = {};

        auth.onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            
            // 🟢 ဝန်ထမ်း Online ဖြစ်ကြောင်းကို Auto မှတ်မည့်အပိုင်း
            db.collection("users").doc(user.uid).set({
                username: user.displayName || user.email.split('@')[0], 
                email: user.email,
                lastOnline: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            initFinance();
        } else {
            window.location.href = 'login.html';
        }
    });

    function initFinance() {
        db.collection("transactions").onSnapshot(snap => { txData = []; snap.forEach(doc => txData.push({id: doc.id, ...doc.data()})); renderHistory(); });
        db.collection("repairs").onSnapshot(snap => { rpData = []; snap.forEach(doc => rpData.push({id: doc.id, ...doc.data()})); renderHistory(); });
        db.collection("remarks").onSnapshot(snap => { rmData = {}; snap.forEach(doc => rmData[doc.id] = doc.data().text); renderHistory(); });
    }

    async function logActivity(action, details) {
        let uName = currentUser ? (currentUser.displayName || currentUser.email) : "Unknown";
        try { await db.collection("activity_logs").add({ action: `[${uName}] ${action}`, details, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } 
        catch (e) { console.error("Log error: ", e); }
    }

    async function openDialog(type) {
        isDialogOpen = true;
        const { value: formValues } = await Swal.fire({
            title: type + ' မှတ်ရန်',
            background: '#1e293b',
            color: '#f8fafc',
            html: '<select id="group" class="swal2-input" style="width: 80%; background:#0f172a; color:#fff; border:1px solid #334155;"><option value="Service">Service</option><option value="Office">Office</option></select><input id="name" class="swal2-input" style="background:#0f172a; color:#fff; border:1px solid #334155;" placeholder="အကြောင်းအရာ"><input id="amount" class="swal2-input" style="background:#0f172a; color:#fff; border:1px solid #334155;" type="number" placeholder="ပမာဏ">',
            preConfirm: () => ({ group: document.getElementById('group').value, name: document.getElementById('name').value, amount: Number(document.getElementById('amount').value) })
        });
        isDialogOpen = false;
        if(formValues && formValues.amount) {
            await db.collection("transactions").add({ type, group: formValues.group, name: formValues.name, amount: formValues.amount, date: new Date() });
            await logActivity("ငွေစာရင်း သွင်းခြင်း", `[${formValues.group}] ${type} - ${formValues.name} (${formValues.amount} Ks) ကို စာရင်းသွင်းခဲ့သည်။`);
        }
    }

    async function editTransaction(id, oldGroup, oldName, oldAmount, type) {
        isDialogOpen = true;
        let safeOldGroup = (!oldGroup || oldGroup === 'undefined') ? 'Service' : oldGroup;
        const { value: formValues } = await Swal.fire({
            title: 'စာရင်းပြင်ရန်',
            background: '#1e293b',
            color: '#f8fafc',
            html: `<select id="editGroup" class="swal2-input" style="width: 80%; background:#0f172a; color:#fff; border:1px solid #334155;"><option value="Service" ${safeOldGroup === 'Service' ? 'selected' : ''}>Service</option><option value="Office" ${safeOldGroup === 'Office' ? 'selected' : ''}>Office</option></select><input id="editName" class="swal2-input" style="background:#0f172a; color:#fff; border:1px solid #334155;" value="${oldName}" placeholder="အကြောင်းအရာ"><input id="editAmount" class="swal2-input" style="background:#0f172a; color:#fff; border:1px solid #334155;" type="number" value="${oldAmount}" placeholder="ပမာဏ">`,
            preConfirm: () => ({ group: document.getElementById('editGroup').value, name: document.getElementById('editName').value, amount: Number(document.getElementById('editAmount').value) }),
            showCancelButton: true
        });
        isDialogOpen = false;
        if(formValues && formValues.amount) {
            await db.collection("transactions").doc(id).update({ group: formValues.group, name: formValues.name, amount: formValues.amount });
            Swal.fire({ icon: 'success', title: 'အောင်မြင်ပါသည်', timer: 1000, showConfirmButton: false, background: '#1e293b', color: '#f8fafc' });
        }
    }

    async function deleteTransaction(id, name, amount, type) {
        const res = await Swal.fire({ title: 'ဖျက်မှာလား?', text: `${type} - ${name} (${amount} Ks)`, icon: 'warning', showCancelButton: true, background: '#1e293b', color: '#f8fafc' });
        if(res.isConfirmed) { await db.collection("transactions").doc(id).delete(); Swal.fire({ icon: 'success', title: 'ဖျက်ပြီးပါပြီ', timer: 1000, showConfirmButton: false, background: '#1e293b', color: '#f8fafc' }); }
    }

    async function addRemark(date) {
        const docId = date; 
        const { value: remark } = await Swal.fire({ title: 'မှတ်ချက်', input: 'text', inputValue: rmData[docId]||"", inputPlaceholder: 'စာရင်းမကိုက်ညီဘူး...', showCancelButton: true, background: '#1e293b', color: '#f8fafc' });
        if(remark !== undefined) { await db.collection("remarks").doc(docId).set({ text: remark }); }
    }

    window.onpopstate = () => { if(isDialogOpen) Swal.close(); else window.location.href = 'index.html'; };
    function toggleDetails(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }

    function renderHistory() {
        let monthVal = document.getElementById('monthFilter').value; 
        let groups = {};

        txData.forEach(d => {
            if(!d.date) return;
            let dateObj = d.date.toDate ? d.date.toDate() : new Date(d.date);
            let dStr = dateObj.toLocaleDateString('en-CA'); 
            if(monthVal && !dStr.startsWith(monthVal)) return;

            if(!groups[dStr]) groups[dStr] = { inc: 0, exp: 0, logs: [] };
            if(d.type === 'ဝင်ငွေ') groups[dStr].inc += d.amount; else groups[dStr].exp += d.amount;
            groups[dStr].logs.push({...d, source: 'tx'});
        });

        rpData.forEach(d => {
            if(d.status !== 'ပြီးစီး') return;
            let dStr = d.date; 
            if(!dStr) return;
            if(monthVal && !dStr.startsWith(monthVal)) return;

            if(!groups[dStr]) groups[dStr] = { inc: 0, exp: 0, logs: [] };
            if(d.income > 0) {
                groups[dStr].inc += Number(d.income);
                groups[dStr].logs.push({id: d.id, source: 'rp', type: 'ဝင်ငွေ', group: 'Repair', name: (d.vrno?d.vrno+'|':'') + d.name + ' (ဖုန်းပြင်ခ)', amount: Number(d.income)});
            }
            if(d.cost > 0) {
                groups[dStr].exp += Number(d.cost);
                groups[dStr].logs.push({id: d.id, source: 'rp', type: 'ထွက်ငွေ', group: 'Repair', name: (d.vrno?d.vrno+'|':'') + d.name + ' (ပစ္စည်းဖိုး)', amount: Number(d.cost)});
            }
        });

        let sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));
        let html = "";
        
        sortedDates.forEach(date => {
            let safeId = date.replace(/\//g, '-');
            html += `<div class="date-group" onclick="toggleDetails('${safeId}')">
                        <span>📅 ${date} <span class="remark-btn" onclick="event.stopPropagation(); addRemark('${safeId}')">✏️</span></span>
                        <span style="font-size:11px; color:#a3e635;">ဝင်:${groups[date].inc.toLocaleString()} | ထွက်:${groups[date].exp.toLocaleString()}</span>
                     </div>
                     ${rmData[safeId] ? `<div class="remark-text">⚠️ ${rmData[safeId]}</div>` : ''}
                     <div id="${safeId}" class="details">`;
            
            groups[date].logs.forEach(d => {
                let escapedName = d.name.replace(/'/g, "\\'"); 
                let safeGroup = d.group ? d.group : 'Service';
                let groupBadge = `<span class="group-badge" ${d.source==='rp'?'style="background:#854d0e; color:#fef08a;"':''}>${safeGroup}</span>`;
                
                let actionBtns = d.source === 'tx' 
                    ? `<span class="remark-btn" onclick="editTransaction('${d.id}', '${safeGroup}', '${escapedName}', ${d.amount}, '${d.type}')">✏️</span>
                       <span class="remark-btn delete-btn" onclick="deleteTransaction('${d.id}', '${escapedName}', ${d.amount}, '${d.type}')">🗑️</span>`
                    : ``; 

                html += `<div class="row">
                            <div>${groupBadge}<span style="color:var(--text-main);">${d.name}</span> ${actionBtns}</div>
                            <span style="color:${d.type==='ဝင်ငွေ'?'var(--success)':'var(--danger)'}; font-weight:bold;">${d.type==='ဝင်ငွေ'?'+':'-'}${d.amount.toLocaleString()}</span>
                         </div>`;
            });
            html += `</div>`;
        });
        document.getElementById("historyList").innerHTML = html || "<p style='text-align:center; padding: 20px; color:var(--text-muted);'>စာရင်းမရှိသေးပါ</p>";
    }
</script>
</body>
</html>
