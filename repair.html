<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဖုန်းပြင်ဆင်မှု မှတ်တမ်း</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 10px; }
        .date-group { margin-top: 15px; padding: 10px; background: #e2e8f0; border-radius: 8px; font-weight: bold; display: flex; justify-content: space-between; font-size: 14px; }
        .card { background: white; padding: 12px; margin: 5px 0; border-radius: 8px; border-left: 5px solid #ccc; }
        .btn-add { width: 100%; padding: 12px; background: #f59e0b; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-edit { background: #4f46e5; border: none; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <h3>🛠 ဖုန်းပြင်ဆင်မှု (Repair)</h3>
    <button class="btn-add" onclick="showForm()">+ အပ်ထားသော ဖုန်းအသစ်</button>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 VR-No, နာမည် သို့မဟုတ် ဖုန်းအမျိုးအစားဖြင့် ရှာရန်..." onkeyup="filterRepair()">
    <div id="repairList"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allData = [];
    let repairMap = new Map();

    async function logActivity(details) {
        await db.collection("activity_logs").add({ 
            action: "Repairပြင်ဆင်ခြင်း", 
            details: details, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        });
    }

    async function showForm(data = null) {
        const { value: formValues } = await Swal.fire({
            title: data ? 'အချက်အလက်ပြင်ရန်' : 'ဖုန်းအသစ်အပ်ရန်',
            html: `<input id="vrno" class="swal2-input" placeholder="VR-No" value="${data ? data.vrno : ''}">
                   <input id="name" class="swal2-input" placeholder="နာမည်" value="${data ? data.name : ''}">
                   <input id="model" class="swal2-input" placeholder="ဖုန်းအမျိုးအစား" value="${data ? data.model : ''}">
                   <input id="issue" class="swal2-input" placeholder="ပြစ်ချက်" value="${data ? data.issue : ''}">
                   <input id="location" class="swal2-input" placeholder="ဒေသ" value="${data ? data.location : ''}">
                   <input id="remark" class="swal2-input" placeholder="မှတ်ချက်" value="${data ? data.remark : ''}">
                   <select id="status" class="swal2-select">
                       <option value="ပြင်ဆင်နေဆဲ" ${data?.status === 'ပြင်ဆင်နေဆဲ' ? 'selected' : ''}>⏳ ပြင်ဆင်နေဆဲ</option>
                       <option value="ပြီးစီး" ${data?.status === 'ပြီးစီး' ? 'selected' : ''}>✅ ပြီးစီး</option>
                   </select>
                   <input id="cost" class="swal2-input" type="number" placeholder="ရင်းငွေ" value="${data ? data.cost : 0}">
                   <input id="income" class="swal2-input" type="number" placeholder="ရငွေ" value="${data ? data.income : 0}">`,
            preConfirm: () => ({ 
                vrno: document.getElementById('vrno').value, name: document.getElementById('name').value, 
                model: document.getElementById('model').value, issue: document.getElementById('issue').value,
                location: document.getElementById('location').value, remark: document.getElementById('remark').value,
                status: document.getElementById('status').value,
                cost: Number(document.getElementById('cost').value), income: Number(document.getElementById('income').value)
            })
        });

        if(!formValues || !formValues.name) return;

        if(data) {
            // ပြောင်းလဲမှုများကို စစ်ဆေးခြင်း
            let changes = [];
            if(data.status !== formValues.status) changes.push(`Status:${data.status}->${formValues.status}`);
            if(data.cost !== formValues.cost) changes.push(`Cost:${data.cost}->${formValues.cost}`);
            if(data.income !== formValues.income) changes.push(`Income:${data.income}->${formValues.income}`);
            if(data.issue !== formValues.issue) changes.push(`Issue:${data.issue}->${formValues.issue}`);
            
            let logMsg = `VR:${formValues.vrno} ကို ပြင်ဆင်သည်။ ${changes.length > 0 ? "ပြောင်းလဲမှုများ: " + changes.join(", ") : "(အချက်အလက်များ မပြောင်းလဲပါ)"}`;

            await db.collection("repairs").doc(data.id).update(formValues);
            await logActivity(logMsg);
            Swal.fire('အောင်မြင်ပါသည်', '', 'success');
        } else {
            await db.collection("repairs").add({...formValues, date: new Date().toLocaleDateString() });
            await logActivity(`VR:${formValues.vrno} အသစ်ထည့်သွင်းသည်။`);
            Swal.fire('ထည့်သွင်းပြီးပါပြီ', '', 'success');
        }
    }

    function renderList(data) {
        let groups = {};
        data.forEach(d => {
            if(!groups[d.date]) groups[d.date] = [];
            groups[d.date].push(d);
        });

        let html = "";
        for(let date in groups) {
            html += `<div class="date-group"><span>📅 ${date}</span> <span>စုစုပေါင်း: ${groups[date].length} လုံး</span></div>`;
            groups[date].forEach(d => {
                let statusColor = d.status === 'ပြီးစီး' ? '#10b981' : '#f59e0b';
                let statusText = d.status === 'ပြီးစီး' ? '✅ Done' : '⏳ Loading';
                html += `<div class="card" style="border-left: 5px solid ${statusColor}">
                    <div class="row"><b>${d.vrno} | ${d.name}</b> <span style="color:${statusColor}">${statusText}</span></div>
                    <div>📱 ${d.model} | 📍 ${d.location}</div>
                    <div>⚠️ ${d.issue}</div>
                    <div style="font-size:11px; color:#666;">မှတ်ချက်: ${d.remark}</div>
                    <div class="row"><span>ရင်း:${d.cost} | ရ:${d.income}</span> <button class="btn-edit" onclick="showForm(repairMap.get('${d.id}'))">ပြင်မည်</button></div>
                </div>`;
            });
        }
        document.getElementById("repairList").innerHTML = html;
    }

    function filterRepair() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        renderList(allData.filter(d => 
            (d.name || '').toLowerCase().includes(term) || 
            (d.vrno || '').toLowerCase().includes(term) || 
            (d.model || '').toLowerCase().includes(term)
        ));
    }

    db.collection("repairs").orderBy("date", "desc").onSnapshot(snap => {
        allData = []; repairMap.clear();
        snap.forEach(doc => {
            let d = { id: doc.id, ...doc.data() };
            allData.push(d);
            repairMap.set(doc.id, d);
        });
        renderList(allData);
    });
</script>
</body>
</html>
