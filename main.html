<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobileAnswer - Full System</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&display=swap');
        :root { --primary: #4f46e5; --dark: #1e293b; --bg: #f8fafc; }
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans Myanmar',sans-serif; }
        body{ background: var(--bg); padding-bottom:50px; }
        .header-section { background: linear-gradient(135deg, #1e3a8a, #7c3aed); padding: 10px 15px; display: flex; align-items: center; gap: 8px; color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .logo-wrapper { width: 45px; height: 45px; background: white; border-radius: 50%; padding: 3px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .header-section h1 { font-size: 16px; flex-grow: 1; }
        .nav-btn { background:white; color:var(--primary); padding:5px 8px; border-radius:15px; border:none; font-size:10px; font-weight:bold; cursor:pointer; }
        .logout-btn { background:#ef4444; color:white; }
        .container { padding: 15px; max-width: 550px; margin: 0 auto; }
        .search-box { background: white; border-radius: 12px; padding: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .search-box input { width: 100%; border: none; outline: none; font-size: 14px; background: transparent; }
        .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .summary-card { background: white; padding: 8px 2px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; }
        .summary-card.active-filter { border-color: var(--primary); background: #eef2ff; }
        .summary-card h3 { font-size: 8px; color: #64748b; }
        .summary-card p { font-size: 11px; font-weight: 800; color: var(--primary); }
        .open-form-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: 600; cursor: pointer; }
        .card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px; }
        .product-name { font-size: 14px; font-weight: 700; word-break: break-word; }
        .badge { padding: 2px 8px; border-radius: 10px; color: white; font-size: 8px; }
        .instock { background: #10b981; } .sold { background: #ef4444; } .repair { background: #f59e0b; }
        .info-row { font-size: 12px; color: #475569; display: flex; justify-content: space-between; margin-bottom: 3px;}
        .card-actions { display: flex; gap: 6px; margin-top: 8px; }
        .card-actions button { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .edit-btn { background: #f1f5f9; } .delete-btn { background: #fff1f2; color: #e11d48; }
        .minus-btn { background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="logo-wrapper"><img src="https://i.postimg.cc/sg5cDCt1/file-0000000001307207a601f81cc1f5617a.png" alt="Logo"></div>
    <h1>MobileAnswer</h1>
    <button class="nav-btn" onclick="window.location.href='repair.html'">🛠 Repair</button>
    <button class="nav-btn" onclick="window.location.href='finance.html'">💰 ငွေစာရင်း</button>
    <button class="nav-btn logout-btn" onclick="firebase.auth().signOut()">🚪 ထွက်မည်</button>
</div>

<div class="container">
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 ရှာဖွေရန်..." oninput="onSearchInput()"></div>

    <div class="summary-grid">
        <div class="summary-card active-filter" onclick="setFilter('အားလုံး', this)"><h3>အားလုံး</h3><p id="tCount">0</p></div>
        <div class="summary-card" onclick="setFilter('အထွေထွေ', this)"><h3>အထွေထွေ</h3><p id="gCount">0</p></div>
        <div class="summary-card" onclick="setFilter('Hardwareအပိုပစ္စည်', this)"><h3>HW</h3><p id="hCount">0</p></div>
        <div class="summary-card" onclick="setFilter('accessories', this)"><h3>Acc</h3><p id="aCount">0</p></div>
        <div class="summary-card" onclick="setFilter('ရောင်းပြီး', this)"><h3>ရောင်း</h3><p id="sCount">0</p></div>
    </div>

    <div class="add-section"><button class="open-form-btn" id="btnToggle" onclick="openAddModal()">+ ပစ္စည်းအသစ်ထည့်ရန်</button></div>

    <div id="productList"></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentFilter = 'အားလုံး';
let currentSearchTerm = '';
let unsubscribeProducts = null;

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Auth
auth.onAuthStateChanged(async user => { 
    if(user) { 
        currentUser = user; 
        await db.collection("users").doc(user.uid).set({
            username: user.displayName || user.email.split('@')[0],
            email: user.email,
            lastOnline: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        loadProducts();
    } else { 
        window.location.href = 'login.html'; 
    } 
});

async function logActivity(action, details) {
    try { 
        let uName = currentUser ? (currentUser.displayName || currentUser.email) : "Unknown";
        await db.collection("activity_logs").add({ 
            action: `[${uName}] ${action}`, 
            details, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        }); 
    } catch (e) { console.error("Log error: ", e); }
}

// Product listener
function loadProducts() {
    if (unsubscribeProducts) unsubscribeProducts();
    unsubscribeProducts = db.collection("products").orderBy("updatedAt", "desc").onSnapshot((snap) => {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        currentSearchTerm = searchTerm;
        
        let allProducts = [];
        let totalActive = 0, genCount = 0, hwCount = 0, accCount = 0, soldCount = 0;
        
        snap.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount || 0);
            if (d.status !== "ရောင်းပြီး") {
                totalActive += amt;
                if (d.category === "အထွေထွေ") genCount += amt;
                else if (d.category === "Hardwareအပိုပစ္စည်") hwCount += amt;
                else if (d.category === "accessories") accCount += amt;
            } else {
                soldCount += amt;
            }
            allProducts.push({ id: doc.id, ...d, amt });
        });
        
        document.getElementById("tCount").innerText = totalActive;
        document.getElementById("gCount").innerText = genCount;
        document.getElementById("hCount").innerText = hwCount;
        document.getElementById("aCount").innerText = accCount;
        document.getElementById("sCount").innerText = soldCount;
        
        let filtered = allProducts.filter(p => {
            const matchSearch = p.name.toLowerCase().includes(searchTerm);
            if (!matchSearch) return false;
            if (currentFilter === 'အားလုံး') return p.status !== "ရောင်းပြီး";
            if (currentFilter === 'ရောင်းပြီး') return p.status === "ရောင်းပြီး";
            return p.category === currentFilter && p.status !== "ရောင်းပြီး";
        });
        
        renderProductList(filtered);
    });
}

function renderProductList(products) {
    const listDiv = document.getElementById("productList");
    if (!products.length) {
        listDiv.innerHTML = '<div style="text-align:center; padding:20px;">ပစ္စည်းမရှိပါ</div>';
        return;
    }
    let html = '';
    for (let p of products) {
        const nameEsc = escapeHtml(p.name);
        const catEsc = escapeHtml(p.category);
        const statusClass = p.status === "ပစ္စည်းရှိ" ? "instock" : (p.status === "ရောင်းပြီး" ? "sold" : "repair");
        const statusText = p.status;
        const amt = p.amt;
        const cost = Number(p.costPrice || 0);
        const price = Number(p.price || 0);
        const sellButton = (p.status !== 'ရောင်းပြီး') 
            ? `<button class="minus-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-amt="${amt}" data-price="${price}" data-cost="${cost}" data-cat="${escapeHtml(p.category)}">ရောင်းမည်</button>` 
            : '';
        html += `<div class="card" data-product-id="${p.id}">
            <div class="card-header"><div class="product-name">${nameEsc}</div><div class="badge ${statusClass}">${statusText}</div></div>
            <div class="info-row"><span>📁 အုပ်စု</span> <span>${catEsc}</span></div>
            <div class="info-row"><span>📦 အရေအတွက်</span> <span>${amt} ခု ${sellButton}</span></div>
            <div class="info-row"><span>💵 ရင်း / ရောင်း</span> <span style="font-weight:bold;">${cost.toLocaleString()} / ${price.toLocaleString()} Ks</span></div>
            <div class="card-actions">
                <button class="edit-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-category="${escapeHtml(p.category)}" data-status="${p.status}" data-amount="${amt}" data-price="${price}" data-costprice="${cost}">ပြင်မည်</button>
                <button class="delete-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}">ဖျက်မည်</button>
            </div>
        </div>`;
    }
    listDiv.innerHTML = html;
    
    // Attach event listeners dynamically (avoid inline onclick issues)
    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const category = btn.dataset.category;
            const status = btn.dataset.status;
            const amount = parseInt(btn.dataset.amount);
            const price = parseInt(btn.dataset.price);
            const costPrice = parseInt(btn.dataset.costprice);
            openEditModal(id, name, category, status, amount, price, costPrice);
        });
    });
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            handleDelete(id, name);
        });
    });
    
    document.querySelectorAll('.minus-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const amt = parseInt(btn.dataset.amt);
            const price = parseInt(btn.dataset.price);
            const cost = parseInt(btn.dataset.cost);
            const cat = btn.dataset.cat;
            sellOne(id, name, amt, price, cost, cat);
        });
    });
}

// ---------- Modal Functions (Guaranteed to show) ----------
async function openAddModal() {
    const { value: formValues } = await Swal.fire({
        title: 'ပစ္စည်းအသစ်ထည့်ရန်',
        html: `
            <input id="swal-name" class="swal2-input" placeholder="ပစ္စည်းအမည်" required>
            <select id="swal-category" class="swal2-select">
                <option value="အထွေထွေ">အထွေထွေ</option>
                <option value="Hardwareအပိုပစ္စည်">Hardwareအပိုပစ္စည်</option>
                <option value="accessories">accessories</option>
            </select>
            <select id="swal-status" class="swal2-select">
                <option value="ပစ္စည်းရှိ">ပစ္စည်းရှိ</option>
                <option value="ရောင်းပြီး">ရောင်းပြီး</option>
                <option value="ပြင်ဆင်ရန်">ပြင်ဆင်ရန်</option>
            </select>
            <input id="swal-amount" type="number" class="swal2-input" placeholder="အရေအတွက်" required>
            <input id="swal-costPrice" type="number" class="swal2-input" placeholder="ရင်းနှီးမြှုပ်နှံမှုစျေး" required>
            <input id="swal-price" type="number" class="swal2-input" placeholder="ရောင်းစျေး" required>
        `,
        focusConfirm: false,
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const category = document.getElementById('swal-category').value;
            const status = document.getElementById('swal-status').value;
            const amount = parseInt(document.getElementById('swal-amount').value);
            const costPrice = parseInt(document.getElementById('swal-costPrice').value);
            const price = parseInt(document.getElementById('swal-price').value);
            if (!name || !amount || !costPrice || !price) {
                Swal.showValidationMessage('အချက်အလက်အပြည့်ဖြည့်ပါ');
                return false;
            }
            return { name, category, status, amount, costPrice, price };
        }
    });
    if (formValues) {
        try {
            await db.collection("products").add({
                ...formValues,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await logActivity("ပစ္စည်းအသစ်", `${formValues.name} (${formValues.amount} ခု)`);
            Swal.fire({ icon: 'success', title: 'အောင်မြင်ပါသည်', timer: 1500 });
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        }
    }
}

async function openEditModal(id, name, category, status, amount, price, costPrice) {
    // Ensure values are properly escaped for HTML but not double-encoded
    const safeName = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const { value: formValues } = await Swal.fire({
        title: 'ပစ္စည်းပြင်ရန်',
        html: `
            <input id="swal-name" class="swal2-input" placeholder="ပစ္စည်းအမည်" value="${safeName}" required>
            <select id="swal-category" class="swal2-select">
                <option ${category === 'အထွေထွေ' ? 'selected' : ''} value="အထွေထွေ">အထွေထွေ</option>
                <option ${category === 'Hardwareအပိုပစ္စည်' ? 'selected' : ''} value="Hardwareအပိုပစ္စည်">Hardwareအပိုပစ္စည်</option>
                <option ${category === 'accessories' ? 'selected' : ''} value="accessories">accessories</option>
            </select>
            <select id="swal-status" class="swal2-select">
                <option ${status === 'ပစ္စည်းရှိ' ? 'selected' : ''} value="ပစ္စည်းရှိ">ပစ္စည်းရှိ</option>
                <option ${status === 'ရောင်းပြီး' ? 'selected' : ''} value="ရောင်းပြီး">ရောင်းပြီး</option>
                <option ${status === 'ပြင်ဆင်ရန်' ? 'selected' : ''} value="ပြင်ဆင်ရန်">ပြင်ဆင်ရန်</option>
            </select>
            <input id="swal-amount" type="number" class="swal2-input" placeholder="အရေအတွက်" value="${amount}" required>
            <input id="swal-costPrice" type="number" class="swal2-input" placeholder="ရင်းနှီးမြှုပ်နှံမှုစျေး" value="${costPrice}" required>
            <input id="swal-price" type="number" class="swal2-input" placeholder="ရောင်းစျေး" value="${price}" required>
        `,
        focusConfirm: false,
        preConfirm: () => {
            const newName = document.getElementById('swal-name').value;
            const newCat = document.getElementById('swal-category').value;
            const newStatus = document.getElementById('swal-status').value;
            const newAmount = parseInt(document.getElementById('swal-amount').value);
            const newCost = parseInt(document.getElementById('swal-costPrice').value);
            const newPrice = parseInt(document.getElementById('swal-price').value);
            if (!newName || !newAmount || !newCost || !newPrice) {
                Swal.showValidationMessage('အချက်အလက်အပြည့်ဖြည့်ပါ');
                return false;
            }
            return { name: newName, category: newCat, status: newStatus, amount: newAmount, costPrice: newCost, price: newPrice };
        }
    });
    if (formValues) {
        try {
            await db.collection("products").doc(id).update({
                ...formValues,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await logActivity("ပြင်ဆင်ခြင်း", formValues.name);
            Swal.fire({ icon: 'success', title: 'ပြင်ဆင်ပြီးပါပြီ', timer: 1500 });
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        }
    }
}

async function sellOne(id, name, currAmt, price, costPrice, cat) {
    const res = await Swal.fire({ title: 'ရောင်းထုတ်မှာလား?', text: name + " (၁) ခု ရောင်းမည်", icon: 'warning', showCancelButton: true });
    if(res.isConfirmed) {
        if(currAmt > 1) {
            await db.collection("products").doc(id).update({ amount: currAmt - 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await db.collection("products").doc(id).delete();
        }
        await db.collection("transactions").add({ type: "ဝင်ငွေ", group: "Sales", name: "ရောင်းရငွေ: " + name, amount: Number(price), date: new Date() });
        await logActivity("ရောင်းချခြင်း", name + " (၁) ခု ရောင်းချပြီး " + price + " Ks ရရှိသည်။");
        
        const saleSnap = await db.collection("products").where("name", "==", name + " (ရောင်းပြီး)").where("status", "==", "ရောင်းပြီး").get();
        if(!saleSnap.empty) {
            const saleDoc = saleSnap.docs[0];
            await db.collection("products").doc(saleDoc.id).update({ amount: saleDoc.data().amount + 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await db.collection("products").add({ name: name + " (ရောင်းပြီး)", category: cat, status: "ရောင်းပြီး", amount: 1, costPrice: costPrice, price: price, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        Swal.fire({ icon: 'success', title: 'ရောင်းချပြီးစီး', timer: 1000 });
    }
}

async function handleDelete(id, name) {
    const res = await Swal.fire({ title: 'ဖျက်မှာလား?', text: `"${name}" အား ဖျက်မည်`, icon: 'warning', showCancelButton: true }); 
    if(res.isConfirmed) {
        await db.collection("products").doc(id).delete();
        await logActivity("ဖျက်ခြင်း", name);
        Swal.fire('ဖျက်ပြီးပါပြီ', '', 'success');
    }
}

function setFilter(cat, el) { 
    currentFilter = cat; 
    document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active-filter')); 
    el.classList.add('active-filter'); 
    loadProducts(); // refresh filter
}

function onSearchInput() {
    loadProducts(); // re-run filter
}

// Back button clears search
function setupBackButtonClear() {
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function(event) {
        const searchInput = document.getElementById('searchInput');
        if (searchInput && searchInput.value.trim() !== '') {
            searchInput.value = '';
            onSearchInput();
            history.pushState(null, null, location.href);
        }
    });
}
setupBackButtonClear();
</script>
</body>
</html>
