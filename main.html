<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobileAnswer - Full System</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&display=swap');
        :root { --primary: #4f46e5; --dark: #1e293b; --bg: #f8fafc; }
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans Myanmar',sans-serif; }
        body{ background: var(--bg); padding-bottom:50px; }
        body.is-searching .header-section, body.is-searching .summary-grid, body.is-searching .add-section, body.is-searching .form-box { display: none !important; }
        .header-section { background: linear-gradient(135deg, #1e3a8a, #7c3aed); padding: 10px 15px; display: flex; align-items: center; gap: 8px; color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .logo-wrapper { width: 45px; height: 45px; background: white; border-radius: 50%; padding: 3px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .header-section h1 { font-size: 16px; flex-grow: 1; }
        .nav-btn { background:white; color:var(--primary); padding:5px 8px; border-radius:15px; border:none; font-size:10px; font-weight:bold; cursor:pointer; }
        .logout-btn { background:#ef4444; color:white; }
        .container { padding: 15px; max-width: 550px; margin: 0 auto; }
        .search-box { background: white; border-radius: 12px; padding: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .search-box input { width: 100%; border: none; outline: none; font-size: 14px; background: transparent; }
        .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .summary-card { background: white; padding: 8px 2px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; }
        .summary-card.active-filter { border-color: var(--primary); background: #eef2ff; }
        .summary-card h3 { font-size: 8px; color: #64748b; }
        .summary-card p { font-size: 11px; font-weight: 800; color: var(--primary); }
        .open-form-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: 600; cursor: pointer; }
        .form-box { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: none; border: 1px solid #e2e8f0; }
        .form-box input, .form-box select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 6px; }
        .card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px; }
        .product-name { font-size: 14px; font-weight: 700; }
        .badge { padding: 2px 8px; border-radius: 10px; color: white; font-size: 8px; }
        .instock { background: #10b981; } .sold { background: #ef4444; } .repair { background: #f59e0b; }
        .info-row { font-size: 12px; color: #475569; display: flex; justify-content: space-between; margin-bottom: 3px;}
        .card-actions { display: flex; gap: 6px; margin-top: 8px; }
        .card-actions button { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .edit-btn { background: #f1f5f9; } .delete-btn { background: #fff1f2; color: #e11d48; }
        .minus-btn { background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="logo-wrapper"><img src="https://i.postimg.cc/sg5cDCt1/file-0000000001307207a601f81cc1f5617a.png" alt="Logo"></div>
    <h1>MobileAnswer</h1>
    <button class="nav-btn" onclick="window.location.href='repair.html'">🛠 Repair</button>
    <button class="nav-btn" onclick="window.location.href='finance.html'">💰 ငွေစာရင်း</button>
    <button class="nav-btn logout-btn" onclick="firebase.auth().signOut()">🚪 ထွက်မည်</button>
</div>

<div class="container">
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 ရှာဖွေရန်..." oninput="loadProducts()"></div>

    <div class="summary-grid">
        <div class="summary-card active-filter" onclick="setFilter('အားလုံး', this)"><h3>အားလုံး</h3><p id="tCount">0</p></div>
        <div class="summary-card" onclick="setFilter('အထွေထွေ', this)"><h3>အထွေထွေ</h3><p id="gCount">0</p></div>
        <div class="summary-card" onclick="setFilter('Hardwareအပိုပစ္စည်', this)"><h3>HW</h3><p id="hCount">0</p></div>
        <div class="summary-card" onclick="setFilter('accessories', this)"><h3>Acc</h3><p id="aCount">0</p></div>
        <div class="summary-card" onclick="setFilter('ရောင်းပြီး', this)"><h3>ရောင်း</h3><p id="sCount">0</p></div>
    </div>

    <div class="add-section"><button class="open-form-btn" id="btnToggle" onclick="toggleForm()">+ ပစ္စည်းအသစ်ထည့်ရန်</button></div>

    <form id="productForm" class="form-box">
        <h3 id="formTitle">📝 စာရင်းသွင်းရန်</h3>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="ပစ္စည်းအမည်" required>
        <select id="category">
            <option value="အထွေထွေ">အထွေထွေ</option>
            <option value="Hardwareအပိုပစ္စည်">Hardwareအပိုပစ္စည်</option>
            <option value="accessories">accessories</option>
        </select>
        <select id="status"><option value="ပစ္စည်းရှိ">ပစ္စည်းရှိ</option><option value="ရောင်းပြီး">ရောင်းပြီး</option><option value="ပြင်ဆင်ရန်">ပြင်ဆင်ရန်</option></select>
        <input type="number" id="amount" placeholder="အရေအတွက်" required>
        <input type="number" id="costPrice" placeholder="ရင်းနှီးမြှုပ်နှံမှုစျေး (Cost Price)" required>
        <input type="number" id="price" placeholder="ရောင်းစျေး (Selling Price)" required>
        <button type="button" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:700;" onclick="handleSave()">သိမ်းဆည်းမည်</button>
    </form>

    <div id="productList"></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", authDomain: "masstore-c32a7.firebaseapp.com", projectId: "masstore-c32a7", storageBucket: "masstore-c32a7.firebasestorage.app", messagingSenderId: "321720130071", appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" };
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentFilter = 'အားလုံး';

// Login Check
auth.onAuthStateChanged(user => {
    if(user) { 
        currentUser = user; 
        loadProducts(); // Auth ဝင်ပြီးမှသာ Data များကိုခေါ်မည်
    } else { 
        window.location.href = 'login.html'; 
    }
});

// Log Function Updated
async function logActivity(action, details) {
    try { 
        let uName = currentUser ? (currentUser.displayName || currentUser.email) : "Unknown";
        await db.collection("activity_logs").add({ 
            action: `[${uName}] ${action}`, 
            details, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        }); 
    } catch (e) { console.error("Log error: ", e); }
}

async function sellOne(id, name, currAmt, price, costPrice, cat) {
    const res = await Swal.fire({ title: 'ရောင်းထုတ်မှာလား?', text: name + " (၁) ခု ရောင်းမည်", icon: 'warning', showCancelButton: true });
    if(res.isConfirmed) {
        if(currAmt > 1) await db.collection("products").doc(id).update({ amount: currAmt - 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        else await db.collection("products").doc(id).delete();
        await db.collection("transactions").add({ type: "ဝင်ငွေ", group: "Sales", name: "ရောင်းရငွေ: " + name, amount: Number(price), date: new Date() });
        await logActivity("ရောင်းချခြင်း", name + " (၁) ခု ရောင်းချပြီး " + price + " Ks ရရှိသည်။");
        
        const saleSnap = await db.collection("products").where("name", "==", name + " (ရောင်းပြီး)").where("status", "==", "ရောင်းပြီး").get();
        if(!saleSnap.empty) {
            const saleDoc = saleSnap.docs[0];
            await db.collection("products").doc(saleDoc.id).update({ amount: saleDoc.data().amount + 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await db.collection("products").add({ name: name + " (ရောင်းပြီး)", category: cat, status: "ရောင်းပြီး", amount: 1, costPrice: costPrice, price: price, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        Swal.fire({ icon: 'success', title: 'ရောင်းချပြီးစီး', timer: 1000 });
    }
}

function loadProducts(){
    if(!currentUser) return;
    db.collection("products").orderBy("updatedAt", "desc").onSnapshot((snap) => {
        const list = document.getElementById("productList");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        list.innerHTML = "";
        let t=0, g=0, h=0, a=0, s=0;
        snap.forEach((doc) => {
            const d = doc.data();
            const amt = Number(d.amount || 0);
            const prc = Number(d.price || 0);
            const cost = Number(d.costPrice || 0);
            const searchMatch = d.name.toLowerCase().includes(searchTerm);
            if(d.status !== "ရောင်းပြီး") {
                t++;
                if(d.category === "အထွေထွေ") g += amt;
                if(d.category === "Hardwareအပိုပစ္စည်") h += amt;
                if(d.category === "accessories") a += amt;
            } else { s += amt; }
            let show = (currentFilter === 'အားလုံး' && d.status !== "ရောင်းပြီး") || (currentFilter === d.category && d.status !== "ရောင်းပြီး") || (currentFilter === 'ရောင်းပြီး' && d.status === "ရောင်းပြီး");
            if(searchTerm !== "") { show = searchMatch; document.body.classList.add('is-searching'); }
            else { document.body.classList.remove('is-searching'); }
            if(show) {
                list.innerHTML += `<div class="card">
                    <div class="card-header"><div class="product-name">${d.name}</div><div class="badge ${d.status === "ပစ္စည်းရှိ" ? "instock" : (d.status === "ရောင်းပြီး" ? "sold" : "repair")}">${d.status}</div></div>
                    <div class="info-row"><span>📁 အုပ်စု</span> <span>${d.category}</span></div>
                    <div class="info-row"><span>📦 အရေအတွက်</span> <span>${amt} ခု ${d.status !== 'ရောင်းပြီး' ? `<button class="minus-btn" onclick="sellOne('${doc.id}', '${d.name}', ${amt}, ${prc}, ${cost}, '${d.category}')">ရောင်းမည်</button>` : ''}</span></div>
                    <div class="info-row"><span>💵 ရင်း / ရောင်း</span> <span style="font-weight:bold;">${cost.toLocaleString()} / ${prc.toLocaleString()} Ks</span></div>
                    <div class="card-actions">
                        <button class="edit-btn" onclick="startEdit('${doc.id}', '${d.name}', '${d.category}', '${d.status}', ${amt}, ${prc}, ${cost})">ပြင်မည်</button>
                        <button class="delete-btn" onclick="handleDelete('${doc.id}')">ဖျက်မည်</button>
                    </div>
                </div>`;
            }
        });
        document.getElementById("tCount").innerText = t; document.getElementById("gCount").innerText = g; document.getElementById("hCount").innerText = h; document.getElementById("aCount").innerText = a; document.getElementById("sCount").innerText = s;
    });
}

function setFilter(cat, el) { currentFilter = cat; document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active-filter')); el.classList.add('active-filter'); loadProducts(); }
function startEdit(id, n, c, s, a, p, cp){ document.getElementById("editId").value = id; document.getElementById("name").value = n; document.getElementById("category").value = c; document.getElementById("status").value = s; document.getElementById("amount").value = a; document.getElementById("price").value = p; document.getElementById("costPrice").value = cp; document.getElementById("formTitle").innerText = "🛠 ပြင်ဆင်ရန်"; document.getElementById("productForm").style.display = "block"; }

async function handleSave() { 
    const id = document.getElementById("editId").value; 
    const name = document.getElementById("name").value; 
    const amt = Number(document.getElementById("amount").value);
    const prc = Number(document.getElementById("price").value);
    const cp = Number(document.getElementById("costPrice").value);
    const cat = document.getElementById("category").value;
    const stat = document.getElementById("status").value;

    const res = await Swal.fire({ title: 'အတည်ပြုမလား?', icon: 'question', showCancelButton: true }); 
    if(res.isConfirmed) { 
        const data = { name, category: cat, status: stat, amount: amt, price: prc, costPrice: cp, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }; 
        if(id) {
            await db.collection("products").doc(id).update(data);
            await logActivity("ပြင်ဆင်ခြင်း", name + " ကို ပြင်ဆင်သည်။");
        } else {
            await db.collection("products").add(data);
            await logActivity("ပစ္စည်းအသစ်", name + " (ရောင်းစျေး: " + prc + ", အရေအတွက်: " + amt + ") ထည့်သွင်းသည်။");
        }
        Swal.fire({ icon: 'success', title: 'အောင်မြင်ပါသည်', timer: 1500 }); 
        forceClear(); 
    } 
}

function toggleForm(){ const f = document.getElementById("productForm"); const btn = document.getElementById("btnToggle"); if(f.style.display === "none" || f.style.display === ""){ f.style.display = "block"; btn.innerText = "✖ ပိတ်မည်"; } else { f.style.display = "none"; btn.innerText = "+ ပစ္စည်းအသစ်ထည့်ရန်"; forceClear(); } }
function forceClear(){ document.getElementById("productForm").reset(); document.getElementById("editId").value = ""; document.getElementById("formTitle").innerText = "📝 စာရင်းသွင်းရန်"; }
async function handleDelete(id){ 
    const res = await Swal.fire({ title: 'ဖျက်မှာလား?', icon: 'warning', showCancelButton: true }); 
    if(res.isConfirmed) {
        const doc = await db.collection("products").doc(id).get();
        await db.collection("products").doc(id).delete();
        await logActivity("ဖျက်ခြင်း", doc.data().name + " အား ဖျက်လိုက်သည်။");
    }
}
</script>
</body>
</html>
