<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobileAnswer - Inventory Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans Myanmar', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Custom SweetAlert Form Styles */
        .swal-form-input { width: 100%; padding: 10px; background: #f8fafc; color: #1e293b; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-top: 5px; outline: none; }
        .swal-form-input:focus { border-color: #4f46e5; }
        .swal-form-label { font-size: 12px; font-weight: bold; color: #475569; display: block; margin-top: 12px; }
    </style>
</head>
<body class="text-slate-800 pb-16">

    <div class="max-w-xl mx-auto pt-4 px-4 flex justify-between items-center sticky top-0 bg-[#f1f5f9]/90 backdrop-blur-md z-40 pb-3 border-b border-slate-200">
        <div>
            <h1 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <span class="bg-indigo-100 p-1.5 rounded-lg text-indigo-600">📦</span> Inventory Pro
            </h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase mt-0.5 tracking-wider">Stock Management</p>
        </div>
        <div class="flex gap-2">
    <button onclick="window.location.href='repair.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">
        🛠 Repair
    </button>
    <button onclick="window.location.href='finance.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">
        💰 Finance
    </button>
    <button onclick="showProductForm()" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-xl text-xs font-bold transition-all active:scale-95 flex items-center gap-1 shadow-md">
        <span>➕</span> အသစ်ထည့်မည်
    </button>
    <button onclick="logout()" class="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-2 rounded-xl text-xs font-bold transition-all active:scale-95 shadow-sm">
        ထွက်မည်
    </button>
</div>
    </div>

    <main class="max-w-xl mx-auto p-4">
        
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 rounded-3xl p-5 shadow-lg text-white mb-5">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[11px] text-indigo-200 font-bold mb-1">ပစ္စည်းလက်ကျန် စုစုပေါင်းတန်ဖိုး</p>
                    <h2 id="totalAssetValue" class="text-2xl font-black">0 Ks</h2>
                </div>
                <div class="text-right">
                    <p class="text-[11px] text-indigo-200 font-bold mb-1">စုစုပေါင်း အရေအတွက်</p>
                    <p id="totalStockCount" class="text-lg font-bold">0 ခု</p>
                </div>
            </div>
        </div>

        <div class="relative mb-4">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-slate-400">🔍</span>
            </div>
            <input type="text" id="searchInput" onkeyup="renderProducts()" placeholder="ပစ္စည်းအမည် ရှာဖွေရန်..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium shadow-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all">
        </div>

        <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-5 pb-1" id="filterContainer">
            <button onclick="setFilter('အားလုံး', this)" class="filter-btn active bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all">အားလုံး (<span id="count-all">0</span>)</button>
            <button onclick="setFilter('အထွေထွေ', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all">အထွေထွေ (<span id="count-gen">0</span>)</button>
            <button onclick="setFilter('Hardwareအပိုပစ္စည်', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all">HW အပိုပစ္စည်း (<span id="count-hw">0</span>)</button>
            <button onclick="setFilter('accessories', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all">Accessories (<span id="count-acc">0</span>)</button>
            <button onclick="setFilter('ရောင်းပြီး', this)" class="filter-btn bg-white text-rose-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all">ရောင်းပြီး (<span id="count-sold">0</span>)</button>
        </div>

        <div id="productList" class="space-y-3">
            <div class="text-center py-10"><p class="text-sm text-slate-500 font-bold">Loading Data...</p></div>
        </div>

    </main>

    <script>
        // ================= FIREBASE INITIALIZATION =================
        const firebaseConfig = { 
            apiKey: "AIzaSyC5sGKGeD_zht-Qknp6VPwfPIChqwvX8MQ", 
            authDomain: "masstore-c32a7.firebaseapp.com", 
            projectId: "masstore-c32a7", 
            storageBucket: "masstore-c32a7.firebasestorage.app", 
            messagingSenderId: "321720130071", 
            appId: "1:321720130071:web:20aab19001cc8bb3cd9a52" 
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let currentFilter = 'အားလုံး';

        // ================= AUTHENTICATION & PRESENCE =================
        auth.onAuthStateChanged(user => { 
            if(user) { 
                currentUser = user; 
                // Auto track online status
                db.collection("users").doc(user.uid).set({
                    username: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    lastOnline: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                fetchProducts(); 
            } else { 
                window.location.href = 'login.html'; 
            } 
        });

        function logout() {
            Swal.fire({
                title: 'အကောင့်ထွက်မှာလား?', icon: 'question', showCancelButton: true, confirmButtonText: 'ထွက်မည်', cancelButtonText: 'မထွက်ပါ'
            }).then((result) => {
                if (result.isConfirmed) auth.signOut();
            });
        }

        async function logActivity(action, details) {
            try { 
                let uName = currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : "Unknown";
                await db.collection("activity_logs").add({ 
                    action: `[${uName}] ${action}`, 
                    details, 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    username: uName
                }); 
            } catch (e) { console.error("Log error: ", e); }
        }

        // ================= DATA FETCHING =================
        function fetchProducts() {
            db.collection("products").orderBy("updatedAt", "desc").onSnapshot((snap) => {
                allProducts = [];
                snap.forEach((doc) => { allProducts.push({ id: doc.id, ...doc.data() }); });
                renderProducts();
            });
        }

        // ================= UI RENDERING =================
        function setFilter(cat, btnElement) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-transparent');
                btn.classList.add('bg-white', 'border-slate-200');
                if(btn.innerText.includes('ရောင်းပြီး')) btn.classList.add('text-rose-500');
                else btn.classList.add('text-slate-500');
            });
            
            btnElement.classList.remove('bg-white', 'text-slate-500', 'text-rose-500', 'border-slate-200');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-transparent');
            
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById("productList");
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            list.innerHTML = "";
            
            let t=0, g=0, h=0, a=0, s=0;
            let totalValue = 0;
            let totalQty = 0;

            let filteredHTML = "";

            allProducts.forEach((d) => {
                const amt = Number(d.amount || 0);
                const prc = Number(d.price || 0);
                const cost = Number(d.costPrice || 0);
                
                // Count Logic
                if(d.status !== "ရောင်းပြီး") {
                    t++;
                    totalValue += (amt * cost);
                    totalQty += amt;
                    if(d.category === "အထွေထွေ") g += amt;
                    if(d.category === "Hardwareအပိုပစ္စည်") h += amt;
                    if(d.category === "accessories") a += amt;
                } else { s += amt; }

                // Filter Logic
                let show = false;
                if(searchTerm !== "") {
                    show = d.name.toLowerCase().includes(searchTerm);
                } else {
                    if(currentFilter === 'အားလုံး' && d.status !== "ရောင်းပြီး") show = true;
                    else if(currentFilter === d.category && d.status !== "ရောင်းပြီး") show = true;
                    else if(currentFilter === 'ရောင်းပြီး' && d.status === "ရောင်းပြီး") show = true;
                }

                if(show) {
                    let badgeClass = "bg-emerald-100 text-emerald-700 border-emerald-200";
                    if(d.status === "ရောင်းပြီး") badgeClass = "bg-rose-100 text-rose-700 border-rose-200";
                    else if(d.status === "ပြင်ဆင်ရန်") badgeClass = "bg-amber-100 text-amber-700 border-amber-200";

                    // Prevent breaking JS strings with quotes
                    let safeName = d.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                    filteredHTML += `
                        <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm transition-all hover:shadow-md">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-sm font-bold text-slate-800 leading-tight pr-2">${d.name}</h3>
                                <span class="px-2 py-0.5 rounded-lg text-[9px] font-bold border whitespace-nowrap ${badgeClass}">${d.status}</span>
                            </div>
                            
                            <div class="flex gap-4 text-xs mt-3">
                                <div class="flex-1 bg-slate-50 p-2 rounded-xl border border-slate-100">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1">အုပ်စု</p>
                                    <p class="font-bold text-slate-600 truncate">${d.category}</p>
                                </div>
                                <div class="flex-1 bg-slate-50 p-2 rounded-xl border border-slate-100">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1">လက်ကျန် (ခုရေ)</p>
                                    <p class="font-black text-indigo-600">${amt}</p>
                                </div>
                            </div>

                            <div class="flex justify-between items-center mt-3 pt-3 border-t border-dashed border-slate-200">
                                <div class="text-xs">
                                    <p class="text-[10px] text-slate-400 font-bold mb-0.5">အရင်း / ရောင်းဈေး</p>
                                    <p class="font-bold text-slate-700"><span class="text-slate-400">${cost.toLocaleString()}</span> / <span class="text-emerald-600">${prc.toLocaleString()} Ks</span></p>
                                </div>
                                
                                <div class="flex gap-1.5">
                                    ${d.status !== 'ရောင်းပြီး' && amt > 0 ? `<button onclick="sellOne('${d.id}', '${safeName}', ${amt}, ${prc}, ${cost}, '${d.category}')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold transition-all active:scale-95 shadow-sm">ရောင်းမည်</button>` : ''}
                                    <button onclick="showProductForm('${d.id}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-xl text-xs font-bold transition-all active:scale-95 border border-indigo-100">ပြင်မည်</button>
                                    <button onclick="handleDelete('${d.id}')" class="bg-rose-50 hover:bg-rose-100 text-rose-500 px-3 py-1.5 rounded-xl text-xs font-bold transition-all active:scale-95 border border-rose-100">ဖျက်မည်</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            list.innerHTML = filteredHTML || `<div class="text-center py-10 bg-white rounded-2xl border border-dashed border-slate-300"><p class="text-xs font-bold text-slate-400">ပစ္စည်းမရှိသေးပါ / ရှာမတွေ့ပါ</p></div>`;
            
            // Update Headers & Badges
            document.getElementById("totalAssetValue").innerText = `${totalValue.toLocaleString()} Ks`;
            document.getElementById("totalStockCount").innerText = `${totalQty.toLocaleString()} ခု`;
            
            document.getElementById("count-all").innerText = t;
            document.getElementById("count-gen").innerText = g;
            document.getElementById("count-hw").innerText = h;
            document.getElementById("count-acc").innerText = a;
            document.getElementById("count-sold").innerText = s;
        }

        // ================= BUSINESS LOGIC =================
        async function showProductForm(docId = null) {
            let data = null;
            if (docId) data = allProducts.find(p => p.id === docId);

            const { value: formValues } = await Swal.fire({
                title: data ? 'ပစ္စည်းစာရင်း ပြင်ဆင်ရန်' : 'ပစ္စည်းအသစ် ထည့်သွင်းရန်',
                html: `
                    <div class="text-left mt-2">
                        <label class="swal-form-label">ပစ္စည်းအမည် *</label>
                        <input id="swal-name" class="swal-form-input" placeholder="ဥပမာ - Battery J7 Prime" value="${data ? data.name : ''}">
                        
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="swal-form-label">အုပ်စု *</label>
                                <select id="swal-cat" class="swal-form-input">
                                    <option value="အထွေထွေ" ${data && data.category === 'အထွေထွေ' ? 'selected' : ''}>အထွေထွေ</option>
                                    <option value="Hardwareအပိုပစ္စည်" ${data && data.category === 'Hardwareအပိုပစ္စည်' ? 'selected' : ''}>HW အပိုပစ္စည်း</option>
                                    <option value="accessories" ${data && data.category === 'accessories' ? 'selected' : ''}>Accessories</option>
                                </select>
                            </div>
                            <div class="flex-1">
                                <label class="swal-form-label">အခြေအနေ *</label>
                                <select id="swal-status" class="swal-form-input">
                                    <option value="ပစ္စည်းရှိ" ${data && data.status === 'ပစ္စည်းရှိ' ? 'selected' : ''}>ပစ္စည်းရှိ (In Stock)</option>
                                    <option value="ရောင်းပြီး" ${data && data.status === 'ရောင်းပြီး' ? 'selected' : ''}>ရောင်းပြီး (Sold)</option>
                                    <option value="ပြင်ဆင်ရန်" ${data && data.status === 'ပြင်ဆင်ရန်' ? 'selected' : ''}>ပြင်ဆင်ရန်</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="swal-form-label">အရေအတွက် *</label>
                                <input id="swal-amt" type="number" class="swal-form-input" placeholder="0" value="${data ? data.amount : ''}">
                            </div>
                            <div class="flex-1">
                                <label class="swal-form-label">ဝယ်ရင်းဈေး (Cost)</label>
                                <input id="swal-cost" type="number" class="swal-form-input" placeholder="0" value="${data ? data.costPrice : ''}">
                            </div>
                        </div>
                        
                        <label class="swal-form-label">ရောင်းဈေး (Selling Price) *</label>
                        <input id="swal-price" type="number" class="swal-form-input" placeholder="0 Ks" value="${data ? data.price : ''}">
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'သိမ်းဆည်းမည်',
                cancelButtonText: 'ပိတ်မည်',
                confirmButtonColor: '#4f46e5',
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value.trim();
                    const category = document.getElementById('swal-cat').value;
                    const status = document.getElementById('swal-status').value;
                    const amount = Number(document.getElementById('swal-amt').value);
                    const costPrice = Number(document.getElementById('swal-cost').value) || 0;
                    const price = Number(document.getElementById('swal-price').value) || 0;

                    if (!name || amount <= 0 || price <= 0) {
                        Swal.showValidationMessage('အမည်၊ အရေအတွက် နှင့် ရောင်းဈေးများကို ပြည့်စုံမှန်ကန်စွာ ထည့်ပါ။');
                        return false;
                    }
                    return { name, category, status, amount, costPrice, price };
                }
            });

            if (formValues) {
                const finalData = { ...formValues, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                
                if (docId) {
                    await db.collection("products").doc(docId).update(finalData);
                    await logActivity("စာရင်းပြင်ဆင်ခြင်း", `${formValues.name} ကို ပြင်ဆင်လိုက်သည်။`);
                    Swal.fire({ icon: 'success', title: 'ပြင်ဆင်ပြီးပါပြီ', timer: 1500, showConfirmButton: false });
                } else {
                    await db.collection("products").add(finalData);
                    await logActivity("ပစ္စည်းအသစ်သွင်းခြင်း", `${formValues.name} (${formValues.amount} ခု) စာရင်းသွင်းသည်။`);
                    Swal.fire({ icon: 'success', title: 'ထည့်သွင်းပြီးပါပြီ', timer: 1500, showConfirmButton: false });
                }
            }
        }

        async function sellOne(id, name, currAmt, price, costPrice, cat) {
            const res = await Swal.fire({ 
                title: 'ရောင်းထုတ်မှာလား?', 
                html: `<span class="font-bold text-indigo-600">${name}</span> (၁) ခု ကို ရောင်းမည်။`, 
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonColor: '#10b981', 
                confirmButtonText: 'ရောင်းမည်' 
            });
            
            if(res.isConfirmed) {
                // 1. Update Current Stock
                if(currAmt > 1) {
                    await db.collection("products").doc(id).update({ amount: currAmt - 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    await db.collection("products").doc(id).delete();
                }

                // 2. Add to Transactions (Finance)
                await db.collection("transactions").add({ 
                    type: "ဝင်ငွေ", 
                    group: "Sales", 
                    name: "ရောင်းရငွေ: " + name, 
                    amount: Number(price), 
                    date: new Date() 
                });

                // 3. Log Activity
                await logActivity("ရောင်းချခြင်း", `${name} (၁) ခု ရောင်းချပြီး ${price} Ks ရရှိသည်။`);
                
                // 4. Update/Create Sold Category
                const saleSnap = await db.collection("products").where("name", "==", name + " (ရောင်းပြီး)").where("status", "==", "ရောင်းပြီး").get();
                if(!saleSnap.empty) {
                    const saleDoc = saleSnap.docs[0];
                    await db.collection("products").doc(saleDoc.id).update({ amount: saleDoc.data().amount + 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    await db.collection("products").add({ 
                        name: name + " (ရောင်းပြီး)", category: cat, status: "ရောင်းပြီး", amount: 1, costPrice: costPrice, price: price, updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                }
                
                Swal.fire({ icon: 'success', title: 'ရောင်းချပြီးစီး', timer: 1500, showConfirmButton: false });
            }
        }

        async function handleDelete(id) { 
            const doc = allProducts.find(p => p.id === id);
            if(!doc) return;

            const res = await Swal.fire({ 
                title: 'ဖျက်မှာ သေချာလား?', 
                text: `${doc.name} အား စာရင်းမှ ဖယ်ရှားပါမည်။`, 
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ဖျက်မည်'
            }); 
            
            if(res.isConfirmed) {
                await db.collection("products").doc(id).delete();
                await logActivity("စာရင်းဖျက်ခြင်း", `${doc.name} အား ဖျက်လိုက်သည်။`);
                Swal.fire({ icon: 'success', title: 'ဖျက်ပြီးပါပြီ', timer: 1500, showConfirmButton: false });
            }
        }
    </script>
</body>
